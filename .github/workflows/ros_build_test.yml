    paths-ignore:
      - '**/README.md'

  pull_request:
    branches: [ ros2_disabled ]

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    uses: ctu-mrs/ci_scripts/.github/workflows/ros_build_test.yml@ros2
